<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olijopa 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:     #3b82f6;
      --amarelo:  #f59e0b;
      --verde:    #22c55e;
      --vermelho: #ef4444;
      --gold:     #FFD700;
      --silver:   #C0C0C0;
      --bronze:   #CD7F32;
    }

    [data-theme="dark"] {
      --branco:     #f0f0f0;
      --bg:         #0e0e0e;
      --surface:    #1a1a1a;
      --border:     #2a2a2a;
      --text:       #f0f0f0;
      --muted:      #666;
      --muted2:     #444;
      --header-bg:  linear-gradient(135deg, #111 0%, #1c1c1c 100%);
      --leader-bg:  linear-gradient(135deg, #1a1a1a 0%, #1f1c10 100%);
      --leader-bdr: rgba(255,215,0,0.25);
      --btn-bg:     rgba(255,255,255,0.08);
      --btn-hover:  rgba(255,255,255,0.14);
      --btn-text:   #f0f0f0;
      --shadow:     0 2px 12px rgba(0,0,0,0.4);
      --live-bg:    rgba(239,68,68,0.15);
      --live-bdr:   rgba(239,68,68,0.4);
      --live-color: #ef4444;
      --toast-bg:   #f0f0f0;
      --toast-text: #111;
    }

    [data-theme="light"] {
      --branco:     #374151;
      --bg:         #f4f2ee;
      --surface:    #ffffff;
      --border:     #e2ddd6;
      --text:       #1a1a1a;
      --muted:      #999;
      --muted2:     #ccc;
      --header-bg:  linear-gradient(135deg, #ffffff 0%, #f4f2ee 100%);
      --leader-bg:  linear-gradient(135deg, #fff 60%, #fffdf0 100%);
      --leader-bdr: rgba(184,134,11,0.3);
      --btn-bg:     rgba(0,0,0,0.06);
      --btn-hover:  rgba(0,0,0,0.11);
      --btn-text:   #1a1a1a;
      --shadow:     0 2px 12px rgba(0,0,0,0.07);
      --live-bg:    #fef2f2;
      --live-bdr:   rgba(220,38,38,0.3);
      --live-color: #dc2626;
      --toast-bg:   #1a1a1a;
      --toast-text: #f0f0f0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 56px;
      transition: background 0.3s, color 0.3s;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    [data-theme="dark"] header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── LOGO + TÍTULO ── */
    .header-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .school-logo {
      width:  clamp(2.4rem, 10vw, 4.8rem);
      height: clamp(2.4rem, 10vw, 4.8rem);
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.15);
      transition: border-color 0.3s;
    }

    [data-theme="light"] .school-logo {
      border-color: rgba(0,0,0,0.12);
    }

    .event-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 10vw, 4.8rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    [data-theme="dark"] .event-label {
      background: linear-gradient(180deg, #ffffff 40%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .hbtn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 13px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.3s;
      white-space: nowrap;
    }

    .hbtn:hover  { background: var(--btn-hover); }
    .hbtn:active { transform: scale(0.95); }

    .hbtn.live {
      background: var(--live-bg);
      border-color: var(--live-bdr);
      color: var(--live-color);
      cursor: default;
    }
    .hbtn.live:hover { background: var(--live-bg); }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--live-color);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* ── SCOREBOARD ── */
    .scoreboard {
      width: 100%;
      max-width: 500px;
      padding: 24px 16px 0;
    }

    .status-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
    }
    .status-msg i {
      display: block;
      font-size: 2rem;
      margin-bottom: 12px;
      opacity: 0.35;
    }

    /* ── RANKING CONTAINER ── */
    #ranking {
      position: relative;
    }

    .team-row {
      display: grid;
      grid-template-columns: 28px 58px 1fr auto;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .team-row:hover { transform: translateX(4px); }

    .team-row.leader {
      border-color: var(--leader-bdr);
      background: var(--leader-bg);
    }

    /* ── ANIMAÇÃO DE VIRADA ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes leaderGlow {
      0%   { box-shadow: var(--shadow); }
      30%  { box-shadow: 0 0 0 3px rgba(255,215,0,0.5), 0 4px 24px rgba(255,215,0,0.25); }
      100% { box-shadow: var(--shadow); }
    }

    @keyframes arrowFade {
      0%   { opacity: 1; transform: translateY(0); }
      70%  { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-4px); }
    }

    @keyframes arrowFadeDown {
      0%   { opacity: 0.6; transform: translateY(0); }
      70%  { opacity: 0.6; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(4px); }
    }

    .team-row.moved-up {
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .team-row.moved-down {
      animation: slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .team-row.new-leader {
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both,
                 leaderGlow 1.8s ease 0.4s both;
    }

    /* seta de subida/descida */
    .move-arrow {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      font-size: 0.75rem;
      font-weight: 700;
      pointer-events: none;
    }

    .move-arrow.up {
      color: #22c55e;
      animation: arrowFade 3s ease forwards;
    }

    .move-arrow.down {
      color: #ef4444;
      opacity: 0.5;
      animation: arrowFadeDown 3s ease forwards;
    }

    /* ── POSIÇÃO ── */
    .pos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      text-align: center;
      line-height: 1;
    }
    .pos.gold   { color: var(--gold); }
    .pos.silver { color: var(--silver); }
    .pos.bronze { color: var(--bronze); }
    .pos.other  { color: var(--muted2); }

    /* ── MASCOTE ── */
    .mascot {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .mascot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    [data-theme="dark"] .azul     .mascot { background: rgba(59,130,246,0.18); border: 1px solid rgba(59,130,246,0.35); }
    [data-theme="dark"] .amarelo  .mascot { background: rgba(245,158,11,0.18); border: 1px solid rgba(245,158,11,0.35); }
    [data-theme="dark"] .verde    .mascote { background: rgba(34,197,94,0.18);  border: 1px solid rgba(34,197,94,0.35); }
    [data-theme="dark"] .vermelho .mascot { background: rgba(239,68,68,0.18);  border: 1px solid rgba(239,68,68,0.35); }

    [data-theme="light"] .azul     .mascot { background: #eff6ff; border: 1px solid rgba(37,99,235,0.2); }
    [data-theme="light"] .amarelo  .mascot { background: #fffbeb; border: 1px solid rgba(217,119,6,0.2); }
    [data-theme="light"] .verde    .mascot { background: #f0fdf4; border: 1px solid rgba(22,163,74,0.2); }
    [data-theme="light"] .vermelho .mascot { background: #fef2f2; border: 1px solid rgba(220,38,38,0.2); }

    /* ── INFO ── */
    .team-info { min-width: 0; }

    .team-name {
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .team-tag {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
      transition: color 0.3s;
    }

    .azul     .team-name, .azul     .team-score { color: var(--azul); }
    .amarelo  .team-name, .amarelo  .team-score { color: var(--amarelo); }
    .verde    .team-name, .verde    .team-score { color: var(--verde); }
    .vermelho .team-name, .vermelho .team-score { color: var(--vermelho); }

    /* ── PONTUAÇÃO ── */
    .team-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.1rem;
      line-height: 1;
      text-align: right;
      letter-spacing: 0.02em;
      padding-right: 20px;
    }

    /* ── FOOTER ── */
    footer {
      width: 100%;
      max-width: 500px;
      padding: 32px 16px 0;
      text-align: center;
    }

    .footer-title {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      transition: color 0.3s;
    }

    .instagram-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .ig-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: transform 0.15s, border-color 0.2s, background 0.3s;
    }

    .ig-btn:hover  { transform: translateY(-2px); }
    .ig-btn:active { transform: scale(0.97); }

    .ig-btn i { font-size: 1.6rem; flex-shrink: 0; transition: transform 0.2s; }
    .ig-btn:hover i { transform: scale(1.12); }

    .ig-btn.azul     { border-left: 4px solid var(--azul); }
    .ig-btn.amarelo  { border-left: 4px solid var(--amarelo); }
    .ig-btn.verde    { border-left: 4px solid var(--verde); }
    .ig-btn.vermelho { border-left: 4px solid var(--vermelho); }

    .ig-btn.branco   { border-left: 4px solid var(--branco); }
    .ig-btn.azul     i { color: var(--azul); }
    .ig-btn.amarelo  i { color: var(--amarelo); }
    .ig-btn.verde    i { color: var(--verde); }
    .ig-btn.vermelho i { color: var(--vermelho); }
    .ig-btn.branco   i { color: var(--branco); }

    .ig-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .ig-handle {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.7rem;
      transition: color 0.3s;
    }

    .update-info {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 28px;
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--toast-bg);
      color: var(--toast-text);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 99px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* entrada inicial */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .team-row.initial { animation: fadeUp 0.4s ease both; }
    .team-row.initial:nth-child(1) { animation-delay: 0.05s; }
    .team-row.initial:nth-child(2) { animation-delay: 0.12s; }
    .team-row.initial:nth-child(3) { animation-delay: 0.19s; }
    .team-row.initial:nth-child(4) { animation-delay: 0.26s; }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <img
        src="logo.png"
        alt="Logo da escola"
        class="school-logo"
        onerror="this.style.display='none'"
      />
      <div class="event-label">Olijopa 2026</div>
    </div>
    <div class="header-actions">
      <button class="hbtn" onclick="toggleTheme()" aria-label="Alternar tema">
        <i class="fa-solid fa-moon" id="theme-icon"></i> Tema
      </button>
      <div class="hbtn live">
        <span class="live-dot"></span> Ao vivo
      </div>
      <button class="hbtn" onclick="compartilhar()" aria-label="Compartilhar">
        <i class="fa-solid fa-share-nodes"></i> Compartilhar
      </button>
    </div>
  </header>

  <div class="scoreboard">
    <div id="ranking">
      <div class="status-msg">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        Carregando placar…
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-title">Acompanhe nas redes</div>
    <div class="instagram-grid">
      <a class="ig-btn azul"     href="https://www.instagram.com/olijopa.azul?igsh=eWZiaml0angzbDE4"     target="_blank" rel="noopener">
        <i class="fa-brands fa-instagram"></i>
        <div class="ig-info">
          <span>Equipe Azul</span>
          <span class="ig-handle">@equipeazul</span>
        </div>
      </a>
      <a class="ig-btn amarelo"  href="https://www.instagram.com/olijopa.amarelo?igsh=ZjRmb3Y3YjA1bDlm"  target="_blank" rel="noopener">
        <i class="fa-brands fa-instagram"></i>
        <div class="ig-info">
          <span>Equipe Amarelo</span>
          <span class="ig-handle">@equipeamarelo</span>
        </div>
      </a>
      <a class="ig-btn verde"    href="https://www.instagram.com/olijopa.verde?igsh=MXd5ZTRweXIxYTJzeQ=="    target="_blank" rel="noopener">
        <i class="fa-brands fa-instagram"></i>
        <div class="ig-info">
          <span>Equipe Verde</span>
          <span class="ig-handle">@equipeverde</span>
        </div>
      </a>
      <a class="ig-btn vermelho" href="https://www.instagram.com/olijopa.vermelho?igsh=OTNueTdtOXYwdDVw" target="_blank" rel="noopener">
        <i class="fa-brands fa-instagram"></i>
        <div class="ig-info">
          <span>Equipe Vermelho</span>
          <span class="ig-handle">@equipevermelho</span>
        </div>
      </a>
    </div>
    <a class="ig-btn branco" href="https://www.instagram.com/jopa.gram/" target="_blank" rel="noopener" style="margin-top: 10px; justify-content: center;">
      <i class="fa-brands fa-instagram"></i>
      <div class="ig-info">
        <span>Jopa Oficial</span>
        <span class="ig-handle">@jopa.gram</span>
      </div>
    </a>
    <div class="update-info" id="update-info">Aguardando dados…</div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    // ── CONFIGURAÇÃO ─────────────────────────────────────────────
    const CSV_URL    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-2IrkVxkVqR3NxspC9Aho4Lhk5uUNpbUQuGhKYxum_SPRCmS8MIWokWdess8-Ak8bWObh9BkTf7tJ/pub?gid=0&single=true&output=csv';
    const REFRESH_MS = 30000;

    const TEAM_META = {
      'azul':     { cls: 'azul',     mascot: 'm_azul.png',     ig: 'equipeazul' },
      'amarelo':  { cls: 'amarelo',  mascot: 'm_amarelo.png',  ig: 'equipeamarelo' },
      'verde':    { cls: 'verde',    mascot: 'm_verde.png',    ig: 'equipeverde' },
      'vermelho': { cls: 'vermelho', mascot: 'm_vermelho.png', ig: 'equipevermelho' },
    };

    const EMOJI_FALLBACK = {
      'azul': '🔵', 'amarelo': '🟡', 'verde': '🟢', 'vermelho': '🔴'
    };

    const POS_CLASS = ['gold', 'silver', 'bronze', 'other'];
    const POS_LABEL = ['1º', '2º', '3º', '4º'];

    let prevRanking = [];
    let isFirstLoad = true;

    // ── TEMA ─────────────────────────────────────────────────────
    const root      = document.documentElement;
    const themeIcon = document.getElementById('theme-icon');

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      themeIcon.className = theme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    }

    function toggleTheme() {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('olijopa-theme', next);
    }

    applyTheme(localStorage.getItem('olijopa-theme') || 'dark');

    // ── MASCOTE ──────────────────────────────────────────────────
    function mascotHTML(id, meta) {
      if (meta.mascot) {
        return `<img src="${meta.mascot}" alt="Mascote ${id}"
                  onerror="this.parentElement.innerHTML='${EMOJI_FALLBACK[id] || '⚪'}'"
                  style="width:100%;height:100%;object-fit:contain;">`;
      }
      return EMOJI_FALLBACK[id] || '⚪';
    }

    // ── RENDER ───────────────────────────────────────────────────
    function render(teams) {
      const sorted    = [...teams].sort((a, b) => b.points - a.points);
      const container = document.getElementById('ranking');
      const newRanking = sorted.map(t => t.id);

      const changes = {};
      if (!isFirstLoad && prevRanking.length) {
        const prevLeader = prevRanking[0];

        newRanking.forEach((id, newPos) => {
          const oldPos = prevRanking.indexOf(id);
          if (oldPos === -1) {
            changes[id] = 'same';
          } else if (newPos < oldPos) {
            changes[id] = (newPos === 0 && id !== prevLeader) ? 'new-leader' : 'up';
          } else if (newPos > oldPos) {
            changes[id] = 'down';
          } else {
            changes[id] = 'same';
          }
        });
      }

      container.innerHTML = '';

      sorted.forEach((team, i) => {
        const meta   = TEAM_META[team.id] || { cls: '', mascot: null };
        const change = changes[team.id] || (isFirstLoad ? 'initial' : 'same');

        const row = document.createElement('div');

        let rowClass = `team-row ${meta.cls}`;
        if (i === 0) rowClass += ' leader';
        if (change === 'new-leader') rowClass += ' new-leader';
        else if (change === 'up')    rowClass += ' moved-up';
        else if (change === 'down')  rowClass += ' moved-down';
        else if (change === 'initial') rowClass += ' initial';

        row.className = rowClass;

        let arrowHTML = '';
        if (change === 'up' || change === 'new-leader') {
          arrowHTML = `<span class="move-arrow up">▲</span>`;
        } else if (change === 'down') {
          arrowHTML = `<span class="move-arrow down">▼</span>`;
        }

        row.innerHTML = `
          <div class="pos ${POS_CLASS[i]}">${POS_LABEL[i]}</div>
          <div class="mascot">${mascotHTML(team.id, meta)}</div>
          <div class="team-info">
            <div class="team-name">Equipe ${team.name}</div>
            <div class="team-tag">Pontuação total</div>
          </div>
          <div class="team-score">${team.points}</div>
          ${arrowHTML}
        `;
        container.appendChild(row);
      });

      prevRanking = newRanking;
      isFirstLoad = false;

      const now = new Date();
      document.getElementById('update-info').textContent =
        `Atualizado às ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    function showError(msg) {
      document.getElementById('ranking').innerHTML =
        `<div class="status-msg"><i class="fa-solid fa-triangle-exclamation"></i>${msg}</div>`;
    }

    // ── FETCH ────────────────────────────────────────────────────
    async function fetchScores() {
      try {
        const res = await fetch(CSV_URL + '&t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();

        const teams = text.trim().split('\n')
          .map(line => {
            const parts = line.replace(/"/g, '').split(',');
            return {
              id:     parts[0].trim().toLowerCase(),
              name:   parts[0].trim(),
              points: parseInt(parts[1]) || 0,
            };
          })
          .filter(t => t.id && t.name);

        if (!teams.length) throw new Error('Sem dados');
        render(teams);
      } catch (err) {
        showError('Não foi possível carregar os dados.<br>Verifique a conexão com a planilha.');
        console.error(err);
      }
    }

    // ── COMPARTILHAR ─────────────────────────────────────────────
    function compartilhar() {
      const url  = window.location.href;
      const data = {
        title: 'Olijopa 2026',
        text:  'Acompanhe o placar ao vivo!',
        url,
      };
      if (navigator.share) {
        navigator.share(data).catch(() => {});
      } else {
        navigator.clipboard.writeText(url)
          .then(() => showToast('Link copiado!'))
          .catch(() => showToast('Copie: ' + url));
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── INIT ─────────────────────────────────────────────────────
    fetchScores();
    setInterval(fetchScores, REFRESH_MS);
  </script>

</body>
</html>
